<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Accent bar left -->
  <rect x="80" y="200" width="3" height="230" fill="#ffffff" opacity="0.9"/>

  <!-- SV Logo block -->
  <rect x="80" y="200" width="90" height="90" rx="8" fill="#ffffff"/>
  <text x="125" y="263" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#0a0a0a" text-anchor="middle" letter-spacing="1">SV</text>

  <!-- Name -->
  <text x="80" y="350" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="600" fill="#ffffff" letter-spacing="-1">Srija Vuppala</text>

  <!-- Divider line -->
  <rect x="80" y="375" width="520" height="1.5" fill="#ffffff" opacity="0.2"/>

  <!-- Title -->
  <text x="80" y="415" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#888888" letter-spacing="4">FULL-STACK ENGINEER · AI · CLOUD</text>

  <!-- Tag line -->
  <text x="80" y="460" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#555555">Building systems that think and scale.</text>

  <!-- Bottom detail — companies -->
  <text x="80" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#444444" letter-spacing="2">OPTUM · ERICSSON · UT DALLAS</text>

  <!-- URL -->
  <text x="1120" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#444444" text-anchor="end" letter-spacing="1">srijavuppala.com</text>

  <!-- Right decorative element -->
  <circle cx="1050" cy="315" r="180" stroke="#1e1e1e" stroke-width="1" fill="none"/>
  <circle cx="1050" cy="315" r="120" stroke="#1e1e1e" stroke-width="1" fill="none"/>
  <circle cx="1050" cy="315" r="60" stroke="#222222" stroke-width="1" fill="none"/>
  <circle cx="1050" cy="315" r="8" fill="#2a2a2a"/>

  <!-- Corner accent -->
  <rect x="1140" y="0" width="60" height="4" fill="#ffffff" opacity="0.6"/>
  <rect x="1196" y="0" width="4" height="60" fill="#ffffff" opacity="0.6"/>
</svg>
